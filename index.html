<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxmyeEFISiSAAYgkyb-eANw12YlFFQczHUoB-X7I-oymsTGiEbbdtyENGtZWn3k_GzI/exec";

function enviar() {
  const nombre = document.getElementById("nombre").value;

  if (!nombre) {
    document.getElementById("msg").innerText = "Escribe tu nombre";
    return;
  }

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ nombre: nombre })
  })
  .then(res => res.text())
  .then(data => {
    document.getElementById("msg").innerText = "Registrado ✅";
  })
  .catch(err => {
    document.getElementById("msg").innerText = "Error ❌";
    console.log(err);
  });
}
</script>
