<!DOCTYPE html>
<html>
<head>
  <title>Asistencia</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #eaf4ff;
      padding: 40px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      max-width: 300px;
      margin: auto;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4da6ff;
      border: none;
      color: white;
      border-radius: 10px;
      font-size: 16px;
    }

    #msg {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Registro</h2>

  <input id="nombre" placeholder="Tu nombre">

  <button onclick="enviar()">Registrar</button>

  <p id="msg"></p>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxmyeEFISiSAAYgkyb-eANw12YlFFQczHUoB-X7I-oymsTGiEbbdtyENGtZWn3k_GzI/exec";

function enviar() {
  const nombre = document.getElementById("nombre").value;

  if (!nombre) {
    document.getElementById("msg").innerText = "Escribe tu nombre";
    return;
  }

  document.getElementById("msg").innerText = "Enviando...";

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nombre: nombre
    })
  })
  .then(response => response.text())
  .then(data => {
      if (data === "OK") {
        document.getElementById("msg").innerText = "Registrado ✅";
      } else {
        document.getElementById("msg").innerText = "Error en servidor ⚠️";
      }
  })
  .catch(error => {
    document.getElementById("msg").innerText = "Error de conexión ❌";
    console.log(error);
  });
}
</script>

</body>
</html>
