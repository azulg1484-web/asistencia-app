<!DOCTYPE html>
<html>
<head>
  <title>Asistencia Inteligente</title>
</head>
<body>

<h2>Registro de Asistencia</h2>

<input type="text" id="nombre" placeholder="Tu nombre">
<br><br>

<button onclick="registrar()">Registrar</button>

<p id="status"></p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyHuqw8bnIKbol7P9Pk9RzqQf5UvARmziOAq8aRwKlEOWak1clre-nfr2cIxwqUVzyV/exec";

const SCHOOL_LAT = 13.696091;
const SCHOOL_LNG = -89.168861;
const MAX_DISTANCE = 80;

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
    Math.cos(φ1) * Math.cos(φ2) *
    Math.sin(Δλ/2) * Math.sin(Δλ/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

function registrar() {
  const nombre = document.getElementById("nombre").value;

  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const distancia = getDistance(lat, lng, SCHOOL_LAT, SCHOOL_LNG);

    if (distancia > MAX_DISTANCE) {
      document.getElementById("status").innerText = "No estás en la escuela 🚫";
      return;
    }

    const now = new Date();
    const hora = now.toLocaleTimeString();

    const limite = new Date();
    limite.setHours(7, 10, 0);

    const estado = now <= limite ? "Puntual" : "Tardía";

    let deviceId = localStorage.getItem("deviceId");
    if (!deviceId) {
      deviceId = crypto.randomUUID();
      localStorage.setItem("deviceId", deviceId);
    }

    fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        nombre,
        hora,
        estado,
        lat,
        lng,
        deviceId
      })
    })
    .then(() => {
      document.getElementById("status").innerText = "Registrado correctamente ✅";
    });

  }, () => {
    document.getElementById("status").innerText = "Activa el GPS ⚠️";
  });
}
</script>

</body>
</html>
