<!DOCTYPE html>
<html>
<body style="text-align:center; font-family:Arial;">

<h2>Asistencia</h2>

<input id="nombre" placeholder="Tu nombre">
<br><br>

<button onclick="enviar()">Registrar</button>

<p id="msg"></p>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyHuqw8bnIKbol7P9Pk9RzqQf5UvARmziOAq8aRwKlEOWak1clre-nfr2cIxwqUVzyV/exec";

function enviar() {
  const nombre = document.getElementById("nombre").value;

  if (!nombre) {
    document.getElementById("msg").innerText = "Escribe tu nombre";
    return;
  }

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ nombre })
  })
  .then(() => {
    document.getElementById("msg").innerText = "Registrado ✅";
  })
  .catch(() => {
    document.getElementById("msg").innerText = "Error ❌";
  });
}
</script>

</body>
</html>
